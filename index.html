<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Công việc của tôi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #e8e8e6;
    --text1: #1c1917; --text2: #57534e; --text3: #a8a29e;
    --border1: #d6d3d1; --border2: #e7e5e4;
    --accent: #BA7517; --accent-dark: #854F0B;
    --green: #1D9E75; --red: #993C1D;
    --radius: 10px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1917; --bg2: #292524; --bg3: #3c3836;
      --text1: #fafaf9; --text2: #a8a29e; --text3: #57534e;
      --border1: #44403c; --border2: #292524;
    }
  }
  body { font-family: var(--font); background: var(--bg2); color: var(--text1); min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  .header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .header-left .date-label { font-size: 11px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
  .header-left .title { font-size: 24px; font-weight: 600; }
  .notif-btn { display: flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; border-radius: 99px; border: .5px solid var(--border1); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font); }
  .notif-btn:hover { background: var(--bg); }
  .notif-btn.on { background: #EAF3DE; border-color: #3B6D11; color: #3B6D11; }
  .notif-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .notif-btn.on .notif-dot { background: var(--green); }
  .sync-btns { display: flex; gap: 6px; }
  .sync-btn { display: flex; align-items: center; gap: 5px; height: 34px; padding: 0 13px; border-radius: 99px; border: .5px solid var(--border1); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font); white-space: nowrap; }
  .sync-btn:hover { background: var(--bg); color: var(--text1); }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
  @media(max-width:500px){ .stats-row { grid-template-columns: repeat(2,1fr); } }
  .stat-card { background: var(--bg); border: .5px solid var(--border2); border-radius: var(--radius); padding: 10px 12px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .stat-val { font-size: 20px; font-weight: 600; }
  .stat-val.s-done { color: var(--green); }
  .stat-val.s-pending { color: var(--accent); }
  .stat-val.s-overdue { color: var(--red); }
  .progress-wrap { height: 4px; background: var(--bg3); border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar { height: 4px; background: var(--green); border-radius: 99px; transition: width .4s; }

  .remind-bar { background: var(--bg); border: .5px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .remind-bar label { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
  .remind-bar select { font-size: 13px; height: 30px; padding: 0 8px; border-radius: 7px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text1); outline: none; font-family: var(--font); }
  .remind-hint { font-size: 11px; color: var(--text3); margin-left: auto; }

  .add-area { background: var(--bg); border: .5px solid var(--border2); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; }
  .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .add-row input { flex: 1; font-size: 14px; height: 38px; padding: 0 12px; border-radius: 8px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text1); outline: none; font-family: var(--font); }
  .add-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(186,117,23,.15); }
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .meta-row select { font-size: 13px; height: 32px; padding: 0 8px; border-radius: 7px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text2); outline: none; cursor: pointer; font-family: var(--font); }
  .date-range-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 0; }
  .date-range-row input[type=date] { font-size: 13px; height: 32px; padding: 0 8px; border-radius: 7px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text2); outline: none; font-family: var(--font); }
  .date-range-row input[type=date]:focus { border-color: var(--accent); }
  .dr-label { font-size: 12px; color: var(--text3); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .dr-arrow { font-size: 14px; color: var(--text3); }
  .btn-add { height: 38px; padding: 0 18px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: var(--font); }
  .btn-add:hover { background: var(--accent-dark); }

  .cat-manage { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: .5px solid var(--border2); flex-wrap: wrap; }
  .cat-manage-lbl { font-size: 12px; color: var(--text3); flex-shrink: 0; }
  .cat-manage input[type=text] { font-size: 13px; height: 30px; padding: 0 10px; border-radius: 7px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text1); outline: none; width: 130px; font-family: var(--font); }
  .cat-manage input[type=color] { width: 30px; height: 30px; border: .5px solid var(--border1); border-radius: 7px; cursor: pointer; padding: 2px; background: var(--bg2); }
  .btn-sm { height: 30px; padding: 0 12px; border-radius: 7px; border: .5px solid var(--border1); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font); }
  .btn-sm:hover { background: var(--bg2); }
  .cat-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .cat-chip { font-size: 11px; padding: 3px 9px; border-radius: 99px; display: flex; align-items: center; gap: 4px; cursor: pointer; border: .5px solid transparent; }
  .cat-chip:hover .chip-x { display: inline; }
  .chip-x { display: none; font-size: 10px; opacity: .6; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .fg { display: flex; gap: 4px; flex-wrap: wrap; }
  .fb { height: 28px; padding: 0 12px; border-radius: 99px; border: .5px solid var(--border1); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; font-family: var(--font); }
  .fb.active { background: var(--bg); border-color: var(--text2); color: var(--text1); font-weight: 500; }
  .fb:hover:not(.active) { background: var(--bg); }
  .vd { width: .5px; background: var(--border2); height: 20px; align-self: center; }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .drag-hint { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: 6px; }
  .section-lbl { font-size: 11px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }

  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-item { background: var(--bg); border: .5px solid var(--border2); border-radius: var(--radius); transition: border-color .15s; user-select: none; }
  .task-item:hover { border-color: var(--border1); }
  .task-item.expanded { border-color: var(--border1); }
  .task-item.done-item { opacity: .48; }
  .task-item.dragging { opacity: .3; border-style: dashed; }
  .task-item.drag-over { border-color: var(--accent); border-width: 1px; }
  .task-item.is-overdue { border-left: 3px solid var(--red); }
  .task-item.is-due-soon { border-left: 3px solid var(--accent); }

  .task-main { display: flex; align-items: flex-start; gap: 8px; padding: 12px; }
  .drag-handle { color: var(--text3); cursor: grab; flex-shrink: 0; padding-top: 2px; font-size: 16px; opacity: 0; transition: opacity .15s; }
  .task-item:hover .drag-handle { opacity: 1; }
  .check-btn { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; border: 1.5px solid var(--border1); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .check-btn.checked::after { content:''; display:block; width:10px; height:6px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; line-height: 1.4; word-break: break-word; }
  .done-item .task-name { text-decoration: line-through; color: var(--text3); }
  .task-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .p-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .p-cao { background:#FAECE7; color:#993C1D; }
  .p-trung { background:#FAEEDA; color:#854F0B; }
  .p-thap { background:#EAF3DE; color:#3B6D11; }
  .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
  .note-ind { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }

  /* Date range block */
  .dr-block { margin-top: 7px; }
  .dr-badge { font-size: 11px; display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 99px; border: .5px solid var(--border2); color: var(--text2); background: var(--bg2); }
  .dr-badge.overdue { color: #993C1D; background: #FAECE7; border-color: #f5c6b8; }
  .dr-badge.due-soon { color: #854F0B; background: #FAEEDA; border-color: #f5d9a8; }
  .dr-badge.in-progress { color: #1a6b4a; background: #e6f7f1; border-color: #a7e0cc; }
  .timeline-track { height: 4px; background: var(--bg3); border-radius: 99px; margin-top: 6px; overflow: hidden; }
  .timeline-fill { height: 4px; border-radius: 99px; transition: width .3s; }
  .timeline-labels { display: flex; justify-content: space-between; margin-top: 3px; }
  .tl-lbl { font-size: 10px; color: var(--text3); }

  .task-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .icon-btn { border: none; background: transparent; color: var(--text3); cursor: pointer; padding: 4px 5px; border-radius: 6px; font-size: 15px; line-height: 1; opacity: 0; transition: opacity .15s; }
  .task-item:hover .icon-btn { opacity: 1; }
  .icon-btn:hover { background: var(--bg2); color: var(--text2); }
  .icon-btn.del:hover { color: #E24B4A; background: #FCEBEB; }
  .expand-btn { opacity: 1 !important; transition: transform .2s !important; }
  .task-item.expanded .expand-btn { transform: rotate(180deg); }

  .note-panel { border-top: .5px solid var(--border2); padding: 10px 12px 12px 42px; }
  .note-lbl { font-size: 11px; color: var(--text3); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .note-ta { width: 100%; font-size: 13px; font-family: var(--font); color: var(--text1); background: var(--bg2); border: .5px solid var(--border1); border-radius: 8px; padding: 8px 10px; resize: vertical; min-height: 76px; outline: none; line-height: 1.6; }
  .note-ta:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(186,117,23,.12); }
  .note-ta::placeholder { color: var(--text3); }
  .note-footer { display: flex; justify-content: flex-end; margin-top: 6px; gap: 6px; }
  .btn-xs { height: 28px; padding: 0 14px; border-radius: 7px; border: .5px solid var(--border1); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--font); }
  .btn-xs:hover { background: var(--bg2); }
  .btn-xs.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-xs.primary:hover { background: var(--accent-dark); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 14px; }
  .empty i { font-size: 36px; display: block; margin-bottom: 8px; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text1); color: var(--bg); font-size: 13px; padding: 8px 18px; border-radius: 99px; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Edit modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg); border-radius: 14px; width: 100%; max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,.25); transform: translateY(16px) scale(.97); transition: transform .2s; }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 12px; border-bottom: .5px solid var(--border2); }
  .modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .modal-close { border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 20px; padding: 2px 4px; border-radius: 6px; line-height: 1; }
  .modal-close:hover { background: var(--bg2); color: var(--text2); }
  .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; }
  .modal-label { font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: .03em; }
  .modal-input { font-size: 14px; height: 38px; padding: 0 12px; border-radius: 8px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text1); outline: none; font-family: var(--font); width: 100%; }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(186,117,23,.15); }
  .modal-row { display: flex; gap: 10px; }
  .modal-row .modal-field { flex: 1; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px 16px; border-top: .5px solid var(--border2); }
  .icon-btn.edit:hover { color: var(--accent); background: #FAEEDA; }

  /* Subtasks */
  .subtask-section { border-top: .5px solid var(--border2); padding: 10px 12px 4px 42px; }
  .subtask-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .subtask-lbl { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .subtask-prog { font-size: 11px; color: var(--text3); }
  .subtask-prog-bar-wrap { height: 3px; background: var(--bg3); border-radius: 99px; margin-bottom: 8px; overflow: hidden; }
  .subtask-prog-bar { height: 3px; background: var(--green); border-radius: 99px; transition: width .3s; }
  .subtask-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .subtask-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 7px; }
  .subtask-row:hover { background: var(--bg2); }
  .sub-check { width: 16px; height: 16px; min-width: 16px; border-radius: 4px; border: 1.5px solid var(--border1); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
  .sub-check.checked { background: var(--green); border-color: var(--green); }
  .sub-check.checked::after { content:''; display:block; width:8px; height:5px; border-left:1.5px solid #fff; border-bottom:1.5px solid #fff; transform:rotate(-45deg) translate(1px,-1px); }
  .sub-name { font-size: 13px; flex: 1; color: var(--text1); line-height: 1.4; word-break: break-word; }
  .sub-name.done { text-decoration: line-through; color: var(--text3); }
  .sub-del { border: none; background: transparent; color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 13px; opacity: 0; line-height: 1; }
  .subtask-row:hover .sub-del { opacity: 1; }
  .sub-del:hover { color: #E24B4A; background: #FCEBEB; }
  .subtask-add-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .subtask-add-row input { flex: 1; font-size: 13px; height: 30px; padding: 0 10px; border-radius: 7px; border: .5px solid var(--border1); background: var(--bg2); color: var(--text1); outline: none; font-family: var(--font); }
  .subtask-add-row input:focus { border-color: var(--accent); }
  .btn-sub-add { height: 30px; padding: 0 12px; border-radius: 7px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: var(--font); white-space: nowrap; }
  .btn-sub-add:hover { background: var(--accent-dark); }
  .sub-ind { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="date-label" id="date-label"></div>
      <div class="title">Công việc của tôi</div>
    </div>
    <button class="notif-btn" id="notif-btn" onclick="toggleNotif()">
      <span class="notif-dot"></span>
      <span id="notif-txt">Bật nhắc nhở</span>
    </button>
    <div class="sync-btns">
      <button class="sync-btn" onclick="exportData()" title="Xuất dữ liệu"><i class="ti ti-download"></i> Xuất</button>
      <button class="sync-btn" onclick="document.getElementById('import-file').click()" title="Nhập dữ liệu"><i class="ti ti-upload"></i> Nhập</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)" />
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Tổng cộng</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">Hoàn thành</div><div class="stat-val s-done" id="s-done">0</div></div>
    <div class="stat-card"><div class="stat-label">Còn lại</div><div class="stat-val s-pending" id="s-pending">0</div></div>
    <div class="stat-card"><div class="stat-label">Quá hạn</div><div class="stat-val s-overdue" id="s-overdue">0</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div class="remind-bar" id="remind-bar" style="display:none">
    <i class="ti ti-bell-ringing" style="color:var(--accent);font-size:16px"></i>
    <label>Nhắc trước
      <select id="remind-days" onchange="saveRemindDays()">
        <option value="1">1 ngày</option>
        <option value="2">2 ngày</option>
        <option value="3" selected>3 ngày</option>
        <option value="5">5 ngày</option>
        <option value="7">7 ngày</option>
      </select>
      khi sắp đến hạn kết thúc
    </label>
    <span class="remind-hint" id="remind-hint"></span>
  </div>

  <div class="add-area">
    <div class="add-row">
      <input type="text" id="task-input" placeholder="Thêm công việc mới..." autocomplete="off" />
      <button class="btn-add" onclick="addTask()"><i class="ti ti-plus"></i> Thêm</button>
    </div>
    <div class="meta-row">
      <select id="pri-sel">
        <option value="cao">🔴 Ưu tiên cao</option>
        <option value="trung" selected>🟡 Trung bình</option>
        <option value="thap">🟢 Thấp</option>
      </select>
      <select id="cat-sel"></select>
    </div>
    <div class="date-range-row">
      <span class="dr-label"><i class="ti ti-calendar-event" style="font-size:13px"></i> Thời gian:</span>
      <input type="date" id="start-input" title="Ngày bắt đầu" />
      <span class="dr-arrow">→</span>
      <input type="date" id="end-input" title="Ngày kết thúc" />
    </div>
    <div class="cat-manage">
      <span class="cat-manage-lbl">Danh mục mới:</span>
      <input type="text" id="new-cat-name" placeholder="Tên danh mục" maxlength="20" />
      <input type="color" id="new-cat-color" value="#5DCAA5" />
      <button class="btn-sm" onclick="addCat()">+ Tạo</button>
      <div class="cat-chips" id="cat-chips"></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="fg" id="f-status">
      <button class="fb active" onclick="setF('status','all',this)">Tất cả</button>
      <button class="fb" onclick="setF('status','active',this)">Chưa xong</button>
      <button class="fb" onclick="setF('status','done',this)">Đã xong</button>
      <button class="fb" onclick="setF('status','overdue',this)">⚠️ Quá hạn</button>
    </div>
    <div class="vd"></div>
    <div class="fg" id="f-priority">
      <button class="fb active" onclick="setF('priority','all',this)">Mọi mức độ ưu tiên</button>
      <button class="fb" onclick="setF('priority','cao',this)">🔴 Cao</button>
      <button class="fb" onclick="setF('priority','trung',this)">🟡 TB</button>
      <button class="fb" onclick="setF('priority','thap',this)">🟢 Thấp</button>
    </div>
    <div class="vd"></div>
    <div class="fg" id="f-cat"></div>
  </div>

  <div class="drag-hint"><i class="ti ti-grip-vertical" style="font-size:11px;vertical-align:-1px"></i> Kéo thả để sắp xếp</div>
  <div class="section-lbl" id="list-label">Danh sách</div>
  <div class="task-list" id="task-list"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-overlay" onclick="closeEditOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-edit" style="color:var(--accent)"></i> Chỉnh sửa công việc</div>
      <button class="modal-close" onclick="closeEdit()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <div class="modal-label">TÊN CÔNG VIỆC</div>
        <input class="modal-input" type="text" id="edit-name" placeholder="Tên công việc..." />
      </div>
      <div class="modal-row">
        <div class="modal-field">
          <div class="modal-label">MỨC ĐỘ ƯU TIÊN</div>
          <select class="modal-input" id="edit-priority">
            <option value="cao">🔴 Ưu tiên cao</option>
            <option value="trung">🟡 Trung bình</option>
            <option value="thap">🟢 Thấp</option>
          </select>
        </div>
        <div class="modal-field">
          <div class="modal-label">PHÂN LOẠI</div>
          <select class="modal-input" id="edit-cat"></select>
        </div>
      </div>
      <div class="modal-field">
        <div class="modal-label">THỜI GIAN THỰC HIỆN</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input class="modal-input" type="date" id="edit-start" style="flex:1" />
          <span style="color:var(--text3);font-size:14px">→</span>
          <input class="modal-input" type="date" id="edit-end" style="flex:1" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-xs" onclick="closeEdit()">Huỷ</button>
      <button class="btn-xs primary" onclick="saveEdit()"><i class="ti ti-check" style="font-size:12px;vertical-align:-1px"></i> Lưu thay đổi</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// ── Firebase SDK ──────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDevMrjcEoY-h14feZl7fM0eq1Pj2lCcv0",
  authDomain: "cup-task-list.firebaseapp.com",
  databaseURL: "https://cup-task-list-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cup-task-list",
  storageBucket: "cup-task-list.firebasestorage.app",
  messagingSenderId: "495598253647",
  appId: "1:495598253647:web:84120e1cfdbdaa09d19c3a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'data');

// ── State ─────────────────────────────────────────────────
const DEFAULT_STATE = {
  nextId: 5,
  categories: [
    {id:'es',name:'eSign',color:'#378ADD'},
    {id:'cs',name:'CS',color:'#639922'},
    {id:'cn',name:'Cá nhân',color:'#D4537E'},
  ],
  tasks: []
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let expandedId = null, dragSrcId = null;
let filters = { status:'all', priority:'all', cat:'all' };
let notifOn = localStorage.getItem('notif_on') === '1';
let remindDays = parseInt(localStorage.getItem('remind_days') || '3');
let notifTimer = null;
let fbLoaded = false;

// Show loading
document.getElementById('task-list').innerHTML = '<div class="empty"><i class="ti ti-refresh" style="font-size:28px;display:block;margin-bottom:8px;animation:spin 1s linear infinite"></i>Đang tải dữ liệu...</div>';

// Listen realtime từ Firebase
onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state = data;
    if (!state.subtasks) state.tasks.forEach(t => { if(!t.subtasks) t.subtasks = []; });
  }
  if (!fbLoaded) {
    fbLoaded = true;
    buildCatSel(); buildCatChips(); buildCatFilters(); updateNotifUI();
    if(notifOn && Notification.permission==='granted') scheduleNotifs();
  }
  render();
});

function save() {
  set(dbRef, state).catch(() => showToast('Lỗi lưu dữ liệu!'));
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rgba(hex,a) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function today0() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s) { if(!s) return null; const d=new Date(s+'T00:00:00'); return isNaN(d)?null:d; }
function diffDays(a,b) { return Math.round((b-a)/86400000); }
function fmtDate(s) { const d=parseDate(s); if(!d) return ''; return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`; }
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Date header
const DAYS=['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
const MONTHS=['tháng 1','tháng 2','tháng 3','tháng 4','tháng 5','tháng 6','tháng 7','tháng 8','tháng 9','tháng 10','tháng 11','tháng 12'];
const NOW=new Date();
document.getElementById('date-label').textContent=`${DAYS[NOW.getDay()]}, ngày ${NOW.getDate()} ${MONTHS[NOW.getMonth()]} ${NOW.getFullYear()}`;
document.getElementById('start-input').value=NOW.toISOString().slice(0,10);

// Notification
function updateNotifUI() {
  const btn=document.getElementById('notif-btn'), bar=document.getElementById('remind-bar');
  if (notifOn) {
    btn.classList.add('on');
    document.getElementById('notif-txt').textContent='Nhắc nhở: Bật';
    bar.style.display='flex';
  } else {
    btn.classList.remove('on');
    document.getElementById('notif-txt').textContent='Bật nhắc nhở';
    bar.style.display='none';
  }
  document.getElementById('remind-days').value=remindDays;
}
async function toggleNotif() {
  if (!('Notification' in window)) { showToast('Trình duyệt không hỗ trợ thông báo'); return; }
  if (!notifOn) {
    const perm=await Notification.requestPermission();
    if (perm!=='granted') { showToast('Vui lòng cho phép thông báo trong trình duyệt'); return; }
    notifOn=true; localStorage.setItem('notif_on','1');
    showToast('Đã bật nhắc nhở! 🔔'); scheduleNotifs();
  } else {
    notifOn=false; localStorage.setItem('notif_on','0');
    if (notifTimer) { clearInterval(notifTimer); notifTimer=null; }
    showToast('Đã tắt nhắc nhở');
  }
  updateNotifUI(); render();
}
function saveRemindDays() {
  remindDays=parseInt(document.getElementById('remind-days').value);
  localStorage.setItem('remind_days',remindDays);
  scheduleNotifs(); showToast(`Sẽ nhắc trước ${remindDays} ngày`); render();
}
function checkAndNotify() {
  if (!notifOn||Notification.permission!=='granted') return;
  const tod=today0();
  const notified=JSON.parse(localStorage.getItem('notified_ids')||'{}');
  state.tasks.filter(t=>!t.done&&t.end).forEach(t=>{
    const end=parseDate(t.end); if(!end) return;
    const diff=diffDays(tod,end);
    const nKey=`${t.id}_${t.end}_${remindDays}`;
    if (diff>=0&&diff<=remindDays&&!notified[nKey]) {
      const msg=diff===0?`"${t.name}" — Hôm nay là hạn cuối!`:`"${t.name}" — Còn ${diff} ngày đến hạn kết thúc`;
      new Notification('⏰ Nhắc việc sắp đến hạn',{body:msg});
      notified[nKey]=true;
    }
  });
  localStorage.setItem('notified_ids',JSON.stringify(notified));
  updateRemindHint();
}
function updateRemindHint() {
  const el=document.getElementById('remind-hint'); if(!el) return;
  const tod=today0();
  const n=state.tasks.filter(t=>{
    if(t.done||!t.end) return false;
    const e=parseDate(t.end); if(!e) return false;
    const d=diffDays(tod,e); return d>=0&&d<=remindDays;
  }).length;
  el.textContent=n?`${n} việc sắp đến hạn`:'Không có việc sắp đến hạn';
}
function scheduleNotifs() {
  if (notifTimer) clearInterval(notifTimer);
  if (!notifOn) return;
  checkAndNotify();
  notifTimer=setInterval(checkAndNotify,60*60*1000);
}

// Category
function buildCatSel() {
  document.getElementById('cat-sel').innerHTML=state.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function buildCatChips() {
  document.getElementById('cat-chips').innerHTML=state.categories.map(c=>
    `<span class="cat-chip" style="background:${rgba(c.color,.13)};color:${c.color};border-color:${rgba(c.color,.3)}" onclick="removeCat('${c.id}')">
      <span class="cat-dot" style="background:${c.color}"></span>${esc(c.name)}<span class="chip-x">✕</span>
    </span>`
  ).join('');
}
function buildCatFilters() {
  document.getElementById('f-cat').innerHTML=
    `<button class="fb ${filters.cat==='all'?'active':''}" onclick="setF('cat','all',this)">Mọi phân loại công việc</button>`+
    state.categories.map(c=>`<button class="fb ${filters.cat===c.id?'active':''}" onclick="setF('cat','${c.id}',this)">
      <span class="cat-dot" style="background:${c.color}"></span>${esc(c.name)}</button>`).join('');
}
function addCat() {
  const el=document.getElementById('new-cat-name'),name=el.value.trim(); if(!name){el.focus();return;}
  state.categories.push({id:'u'+Date.now(),name,color:document.getElementById('new-cat-color').value});
  el.value=''; save(); buildCatSel(); buildCatChips(); buildCatFilters(); render(); showToast('Đã thêm danh mục');
}
function removeCat(id) {
  if(state.categories.length<=1){showToast('Cần ít nhất 1 danh mục');return;}
  state.categories=state.categories.filter(c=>c.id!==id);
  state.tasks.forEach(t=>{if(t.cat===id)t.cat=state.categories[0].id;});
  if(filters.cat===id)filters.cat='all';
  save(); buildCatSel(); buildCatChips(); buildCatFilters(); render();
}

// Task
function addTask() {
  const input=document.getElementById('task-input'),name=input.value.trim(); if(!name){input.focus();return;}
  const start=document.getElementById('start-input').value, end=document.getElementById('end-input').value;
  if(start&&end&&end<start){showToast('Ngày kết thúc phải sau ngày bắt đầu!');return;}
  state.tasks.unshift({id:state.nextId++,name,priority:document.getElementById('pri-sel').value,
    cat:document.getElementById('cat-sel').value,start,end,done:false,note:'',subtasks:[]});
  input.value=''; document.getElementById('end-input').value='';
  document.getElementById('start-input').value=NOW.toISOString().slice(0,10);
  save(); render(); showToast('Đã thêm công việc');
}
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
function toggleDone(id) {
  const t=state.tasks.find(t=>t.id===id); if(!t)return; t.done=!t.done; save(); render();
  if(t.done)showToast('Hoàn thành! 🎉');
}
function deleteTask(id) {
  if(!confirm('Xoá công việc này?'))return;
  state.tasks=state.tasks.filter(t=>t.id!==id); if(expandedId===id)expandedId=null;
  save(); render(); showToast('Đã xoá');
}
function toggleExpand(id) {
  if(expandedId===id)expandedId=null;
  else{if(expandedId!==null)persistNote(expandedId); expandedId=id;}
  render();
}
function persistNote(id) {
  const ta=document.getElementById('note-ta-'+id); if(!ta)return;
  const t=state.tasks.find(t=>t.id===id); if(t){t.note=ta.value;save();}
}
function saveNote(id){persistNote(id);expandedId=null;render();showToast('Đã lưu ghi chú');}
function cancelNote(id){expandedId=null;render();}

// Filters
function setF(type,val,btn){
  filters[type]=val;
  const g={status:'f-status',priority:'f-priority'};
  if(g[type])document.querySelectorAll(`#${g[type]} .fb`).forEach(b=>b.classList.remove('active'));
  else document.querySelectorAll('#f-cat .fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function getStatus(t) {
  if(t.done)return 'done';
  const end=parseDate(t.end), tod=today0();
  if(end&&diffDays(tod,end)<0)return 'overdue';
  return 'active';
}
function getFiltered() {
  return state.tasks.filter(t=>{
    const st=getStatus(t);
    if(filters.status==='active'&&st!=='active')return false;
    if(filters.status==='done'&&st!=='done')return false;
    if(filters.status==='overdue'&&st!=='overdue')return false;
    if(filters.priority!=='all'&&t.priority!==filters.priority)return false;
    if(filters.cat!=='all'&&t.cat!==filters.cat)return false;
    return true;
  });
}

// Drag
function onDragStart(e,id){
  dragSrcId=id;
  setTimeout(()=>{const el=document.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('dragging');},0);
  e.dataTransfer.effectAllowed='move';
}
function onDragOver(e,id){
  e.preventDefault();
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('drag-over'));
  if(id!==dragSrcId){const el=document.querySelector(`[data-id="${id}"]`);if(el)el.classList.add('drag-over');}
}
function onDrop(e,tid){
  e.preventDefault(); if(!dragSrcId||dragSrcId===tid)return;
  const si=state.tasks.findIndex(t=>t.id===dragSrcId),ti=state.tasks.findIndex(t=>t.id===tid);
  if(si===-1||ti===-1)return;
  const[m]=state.tasks.splice(si,1); state.tasks.splice(ti,0,m);
  dragSrcId=null; save(); render();
}
function onDragEnd(){
  document.querySelectorAll('.task-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});
  dragSrcId=null;
}

// Date range block
function buildDrBlock(t) {
  const tod=today0(), start=parseDate(t.start), end=parseDate(t.end);
  if(!start&&!end) return '';
  let txt='', cls='dr-badge', icon='ti-calendar';
  if(start&&end){
    const total=Math.max(diffDays(start,end),1);
    const elapsed=Math.min(Math.max(diffDays(start,tod),0),total);
    const pct=Math.round(elapsed/total*100);
    const left=diffDays(tod,end);
    if(!t.done&&left<0){ cls+=' overdue'; txt=`${fmtDate(t.start)} → ${fmtDate(t.end)} &nbsp;·&nbsp; Quá hạn ${Math.abs(left)} ngày`; icon='ti-alert-circle'; }
    else if(!t.done&&left<=remindDays){ cls+=' due-soon'; txt=`${fmtDate(t.start)} → ${fmtDate(t.end)} &nbsp;·&nbsp; Còn ${left} ngày`; icon='ti-clock'; }
    else if(!t.done&&tod>=start){ cls+=' in-progress'; txt=`${fmtDate(t.start)} → ${fmtDate(t.end)} &nbsp;·&nbsp; ${pct}%`; icon='ti-calendar-stats'; }
    else { txt=`${fmtDate(t.start)} → ${fmtDate(t.end)}`; }
    const fillColor=left<0?'var(--red)':left<=remindDays?'var(--accent)':'var(--green)';
    const timeline=!t.done?`<div class="timeline-track"><div class="timeline-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="timeline-labels"><span class="tl-lbl">${fmtDate(t.start)}</span><span class="tl-lbl">${fmtDate(t.end)}</span></div>`:'';
    return `<div class="dr-block"><span class="${cls}"><i class="ti ${icon}" style="font-size:11px"></i> ${txt}</span>${timeline}</div>`;
  }
  if(start&&!end) txt=`Bắt đầu: ${fmtDate(t.start)}`;
  if(!start&&end) txt=`Kết thúc: ${fmtDate(t.end)}`;
  return `<div class="dr-block"><span class="${cls}"><i class="ti ${icon}" style="font-size:11px"></i> ${txt}</span></div>`;
}

// Render
function render() {
  const tod=today0();
  const done=state.tasks.filter(t=>t.done).length, total=state.tasks.length;
  const overdue=state.tasks.filter(t=>{if(t.done||!t.end)return false;const e=parseDate(t.end);return e&&diffDays(tod,e)<0;}).length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-pending').textContent=total-done;
  document.getElementById('s-overdue').textContent=overdue;
  document.getElementById('progress-bar').style.width=(total?Math.round(done/total*100):0)+'%';
  buildCatFilters(); updateRemindHint();
  const filtered=getFiltered();
  document.getElementById('list-label').textContent=`Hiển thị ${filtered.length} / ${total} công việc`;
  const pLabel={cao:'Cao',trung:'Trung bình',thap:'Thấp'};
  const list=document.getElementById('task-list');
  if(!filtered.length){ list.innerHTML=`<div class="empty"><i class="ti ti-clipboard-list"></i>Không có công việc nào</div>`; return; }
  list.innerHTML=filtered.map(t=>{
    const cat=state.categories.find(c=>c.id===t.cat)||state.categories[0];
    const isExp=expandedId===t.id, hasNote=t.note&&t.note.trim().length>0;
    const st=getStatus(t);
    const end=parseDate(t.end), daysLeft=end?diffDays(tod,end):null;
    const subs=t.subtasks||[];
    const subDone=subs.filter(s=>s.done).length, subTotal=subs.length;
    const subPct=subTotal?Math.round(subDone/subTotal*100):0;
    const ic=[t.done?'done-item':'',isExp?'expanded':'',
      !t.done&&st==='overdue'?'is-overdue':'',
      !t.done&&daysLeft!==null&&daysLeft>=0&&daysLeft<=remindDays?'is-due-soon':''
    ].filter(Boolean).join(' ');
    return `<div class="task-item ${ic}" draggable="true" data-id="${t.id}"
        ondragstart="onDragStart(event,${t.id})" ondragover="onDragOver(event,${t.id})" ondrop="onDrop(event,${t.id})" ondragend="onDragEnd()">
      <div class="task-main">
        <i class="ti ti-grip-vertical drag-handle"></i>
        <button class="check-btn ${t.done?'checked':''}" onclick="toggleDone(${t.id})"></button>
        <div class="task-body">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta">
            <span class="p-badge p-${t.priority}">${pLabel[t.priority]}</span>
            <span class="cat-badge" style="background:${rgba(cat.color,.13)};color:${cat.color}">
              <span class="cat-dot" style="background:${cat.color}"></span>${esc(cat.name)}
            </span>
            ${subTotal>0?`<span class="sub-ind"><i class="ti ti-checkbox" style="font-size:11px"></i> ${subDone}/${subTotal}</span>`:''}
            ${hasNote&&!isExp?`<span class="note-ind"><i class="ti ti-notes" style="font-size:11px"></i> Ghi chú</span>`:''}
          </div>
          ${buildDrBlock(t)}
        </div>
        <div class="task-actions">
          <button class="icon-btn edit" onclick="openEdit(${t.id})" title="Chỉnh sửa"><i class="ti ti-edit"></i></button>
          <button class="icon-btn del" onclick="deleteTask(${t.id})"><i class="ti ti-trash"></i></button>
          <button class="icon-btn expand-btn" onclick="toggleExpand(${t.id})"><i class="ti ti-chevron-down"></i></button>
        </div>
      </div>
      <div class="subtask-section" style="display:${isExp?'block':'none'}">
        <div class="subtask-header">
          <div class="subtask-lbl"><i class="ti ti-checkbox" style="font-size:12px"></i> Đầu việc nhỏ</div>
          ${subTotal>0?`<span class="subtask-prog">${subDone}/${subTotal} hoàn thành</span>`:''}
        </div>
        ${subTotal>0?`<div class="subtask-prog-bar-wrap"><div class="subtask-prog-bar" style="width:${subPct}%"></div></div>`:''}
        <div class="subtask-list">
          ${subs.map(s=>`
            <div class="subtask-row">
              <button class="sub-check ${s.done?'checked':''}" onclick="toggleSub(${t.id},${s.id})"></button>
              <span class="sub-name ${s.done?'done':''}">${esc(s.name)}</span>
              <button class="sub-del" onclick="deleteSub(${t.id},${s.id})"><i class="ti ti-x"></i></button>
            </div>`).join('')}
        </div>
        <div class="subtask-add-row">
          <input type="text" id="sub-input-${t.id}" placeholder="Thêm đầu việc nhỏ..." onkeydown="if(event.key==='Enter')addSub(${t.id})" />
          <button class="btn-sub-add" onclick="addSub(${t.id})"><i class="ti ti-plus"></i> Thêm</button>
        </div>
      </div>
      <div class="note-panel" style="${isExp?'':'display:none'}">
        <div class="note-lbl"><i class="ti ti-notes"></i> Ghi chú</div>
        <textarea class="note-ta" id="note-ta-${t.id}" placeholder="Thêm ghi chú, liên kết, chi tiết...">${esc(t.note||'')}</textarea>
        <div class="note-footer">
          <button class="btn-xs" onclick="cancelNote(${t.id})">Huỷ</button>
          <button class="btn-xs primary" onclick="saveNote(${t.id})"><i class="ti ti-check" style="font-size:12px;vertical-align:-1px"></i> Lưu ghi chú</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Subtasks
function addSub(taskId) {
  const input = document.getElementById('sub-input-'+taskId);
  const name = input.value.trim(); if (!name) { input.focus(); return; }
  const t = state.tasks.find(t=>t.id===taskId); if (!t) return;
  if (!t.subtasks) t.subtasks = [];
  t.subtasks.push({ id: Date.now(), name, done: false });
  input.value = ''; save(); render();
  // re-focus after render
  setTimeout(() => { const el = document.getElementById('sub-input-'+taskId); if(el) el.focus(); }, 50);
}
function toggleSub(taskId, subId) {
  const t = state.tasks.find(t=>t.id===taskId); if (!t||!t.subtasks) return;
  const s = t.subtasks.find(s=>s.id===subId); if (!s) return;
  s.done = !s.done; save(); render();
}
function deleteSub(taskId, subId) {
  const t = state.tasks.find(t=>t.id===taskId); if (!t||!t.subtasks) return;
  t.subtasks = t.subtasks.filter(s=>s.id!==subId); save(); render();
}

// Edit modal
let editingId = null;
function openEdit(id) {
  const t = state.tasks.find(t => t.id === id); if (!t) return;
  editingId = id;
  document.getElementById('edit-name').value = t.name;
  document.getElementById('edit-priority').value = t.priority;
  // build cat options
  const catSel = document.getElementById('edit-cat');
  catSel.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  catSel.value = t.cat;
  document.getElementById('edit-start').value = t.start || '';
  document.getElementById('edit-end').value = t.end || '';
  document.getElementById('edit-overlay').classList.add('open');
  setTimeout(() => document.getElementById('edit-name').focus(), 150);
}
function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  editingId = null;
}
function closeEditOnOverlay(e) { if (e.target === document.getElementById('edit-overlay')) closeEdit(); }
function saveEdit() {
  const t = state.tasks.find(t => t.id === editingId); if (!t) return;
  const name = document.getElementById('edit-name').value.trim();
  if (!name) { document.getElementById('edit-name').focus(); return; }
  const start = document.getElementById('edit-start').value;
  const end = document.getElementById('edit-end').value;
  if (start && end && end < start) { showToast('Ngày kết thúc phải sau ngày bắt đầu!'); return; }
  t.name = name;
  t.priority = document.getElementById('edit-priority').value;
  t.cat = document.getElementById('edit-cat').value;
  t.start = start; t.end = end;
  save(); closeEdit(); render(); showToast('Đã lưu thay đổi ✅');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEdit(); });

// Export / Import
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `cong-viec-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Đã xuất dữ liệu! 📁');
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.tasks || !imported.categories) { showToast('File không hợp lệ!'); return; }
      if (!confirm(`Nhập ${imported.tasks.length} công việc?\nDữ liệu hiện tại sẽ bị thay thế.`)) return;
      state = imported;
      save(); buildCatSel(); buildCatChips(); buildCatFilters(); render();
      showToast(`Đã nhập ${imported.tasks.length} công việc! ✅`);
    } catch(_) { showToast('Lỗi đọc file, vui lòng thử lại!'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// (Firebase onValue handles init above)

// Expose functions to global scope (required for onclick in HTML with type=module)
window.addTask = addTask;
window.toggleDone = toggleDone;
window.deleteTask = deleteTask;
window.toggleExpand = toggleExpand;
window.saveNote = saveNote;
window.cancelNote = cancelNote;
window.addSub = addSub;
window.toggleSub = toggleSub;
window.deleteSub = deleteSub;
window.openEdit = openEdit;
window.closeEdit = closeEdit;
window.saveEdit = saveEdit;
window.closeEditOnOverlay = closeEditOnOverlay;
window.toggleNotif = toggleNotif;
window.saveRemindDays = saveRemindDays;
window.setF = setF;
window.addCat = addCat;
window.removeCat = removeCat;
window.exportData = exportData;
window.importData = importData;
window.onDragStart = onDragStart;
window.onDragOver = onDragOver;
window.onDrop = onDrop;
window.onDragEnd = onDragEnd;
</script>
